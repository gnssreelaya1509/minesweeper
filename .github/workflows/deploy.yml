name: Deploy Minesweeper

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet
      - name: Build Web App
        # Use --base-url for subdirectories, --no-prompt for automation
        run: flet build web --base-url /minesweeper/ --no-prompt
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Flet web builds usually go to 'dist' folder
          publish_dir: ./dist