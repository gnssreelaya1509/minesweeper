name: Deploy Minesweeper

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet
      - name: Build Web App
        run: flet build web --base-url /minesweeper/ --no-prompt
      - name: Debug and List Files
        run: |
          echo "Listing contents of the project directory:"
          find . -maxdepth 3 -not -path '*/.*'
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # We will update this path based on what the debug log shows
          publish_dir: build/web
          publish_branch: gh-pages